<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Festival Staff Order</title>
    <!-- 외부 스타일 및 아이콘 라이브러리 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/order.css">
    <!-- Socket.IO 클라이언트 라이브러리 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <h2>
        <span>📱 직원 무선 오더기</span>
        <span class="status-badge" id="net-status">연결 중...</span>
    </h2>

    <div class="mobile-tabs">
        <button class="tab-btn active" id="tab-btn-order" onclick="showOrderScreen('order')">🍔 주문 등록</button>
        <button class="tab-btn" id="tab-btn-waiting-register" onclick="showOrderScreen('waiting-register')">📝 대기 접수</button>
        <button class="tab-btn" id="tab-btn-waiting-status" onclick="showOrderScreen('waiting-status')">👥 대기 현황</button>
    </div>

    <div class="order-app-screen active" id="order-app-screen-order">
        <div class="section-title">🪑 주문할 테이블 선택</div>
        <div class="table-select-grid" id="table-zone"></div>

        <div class="section-title">🍔 메뉴 선택</div>
        <div class="category-container">
            <button class="cat-btn active" id="tab-main" onclick="changeCat('main')">메인</button>
            <button class="cat-btn" id="tab-side" onclick="changeCat('side')">사이드</button>
            <button class="cat-btn" id="tab-drink" onclick="changeCat('drink')">음료</button>
        </div>
        <div class="menu-list-box" id="menu-zone"></div>

        <div class="section-title">🛒 현재 테이블 장바구니</div>
        <div class="cart-box">
            <div class="cart-items" id="cart-zone"></div>
            <div class="total-row">
                <span>추가 주문 금액</span>
                <span><span id="cart-total">0</span>원</span>
            </div>
        </div>

        <button class="send-btn" id="btn-send" onclick="submitOrderToKitchen()" disabled>🚀 주방 태블릿으로 주문 전송</button>
    </div>

    <div class="order-app-screen" id="order-app-screen-waiting-register" style="display:none; padding-bottom: 20px;">
        <div class="section-title">📝 대기 접수</div>
        <div class="form-container" style="display:flex; flex-direction:column; gap:12px; padding:15px; background:var(--card-bg); border-radius:12px; margin-bottom:15px;">
            <div class="form-group" style="display:flex; flex-direction:column; gap:6px;">
                <label style="font-size:13px; color:var(--text-sub);">대기자명 / 팀명</label>
                <input type="text" id="mobile-waiting-name" placeholder="이름 또는 팀명 입력" style="background:#0f172a; border:1px solid #334155; color:#fff; padding:12px; border-radius:8px; font-size:14px; font-weight:bold;">
            </div>
            <div class="form-group" style="display:flex; flex-direction:column; gap:6px;">
                <label style="font-size:13px; color:var(--text-sub);">연락처</label>
                <div class="phone-input-wrapper">
                    <span class="prefix">010</span>
                    <span class="divider">|</span>
                    <input type="tel" id="mobile-waiting-phone" placeholder="중간/뒷번호 입력" maxlength="9" inputmode="numeric" pattern="[0-9]*">
                </div>
            </div>
            <div class="form-group" style="display:flex; flex-direction:column; gap:6px;">
                <label style="font-size:13px; color:var(--text-sub);">인원수</label>
                <select id="mobile-waiting-people" style="background:#0f172a; border:1px solid #334155; color:#fff; padding:12px; border-radius:8px; font-size:14px; font-weight:bold; outline:none; cursor:pointer;">
                    <option value="1">1명</option>
                    <option value="2" selected>2명</option>
                    <option value="3">3명</option>
                    <option value="4">4명</option>
                    <option value="5">5명</option>
                    <option value="6">6명</option>
                </select>
            </div>
            <button class="send-btn" style="position:static; width:100%;" onclick="registerWaitingFromMobile()">대기팀 등록</button>
        </div>
    </div>

    <div class="order-app-screen" id="order-app-screen-waiting-status" style="display:none;">
        <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
            <span>👥 실시간 대기 현황</span>
            <span style="font-size:12px; color:var(--accent);" id="mobile-waiting-count-display">총 0팀 대기중</span>
        </div>
        <div id="mobile-waiting-board" style="display:flex; flex-direction:column; gap:10px; padding:10px 0;"></div>
    </div>

    <!-- 공통 설정 및 비즈니스 로직 스크립트 -->
    <script src="/js/config.js"></script>
    <script src="/js/order.js"></script>
</body>
</html>
